name: Deploy DocC

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: macos-15

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build DocC archive
        run: |
          xcodebuild docbuild \
            -scheme fs-itunes-search-client \
            -destination "generic/platform=iOS" \
            -derivedDataPath .derivedData \
            -skipPackagePluginValidation

      - name: Convert for GitHub Pages
        run: |
          $(xcrun --find docc) process-archive transform-for-static-hosting \
            .derivedData/Build/Products/Debug-iphoneos/ITunesSearchClient.doccarchive \
            --output-path docs \
            --hosting-base-path fs-itunes-search-client

          cat > docs/index.html <<'EOF'
          <!doctype html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=documentation/itunessearchclient/">
          </head>
          </html>
          EOF

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
