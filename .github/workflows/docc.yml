name: Deploy DocC

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-14
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - name: Build All DocC 🛠
        run: |
          swift package resolve;
          xcodebuild docbuild -scheme fs-itunes-search-client -derivedDataPath /tmp/docbuild -destination 'generic/platform=iOS' -skipPackagePluginValidation;
          $(xcrun --find docc) process-archive \
            transform-for-static-hosting /tmp/docbuild/Build/Products/Debug-iphoneos/ITunesSearchClient.doccarchive \
            --output-path docs \
            --hosting-base-path fs-itunes-search-client;
          echo "<script>window.location.href += \"/documentation/itunessearchclient\"</script>" > docs/index.html;

      - name: Upload artifact 📜
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload docs directory
          path: 'docs'
      - name: Deploy to GitHub Pages 🐙
        id: deployment
        uses: actions/deploy-pages@v4
